name: Update Hone Literacy reading data

# Refreshes data/manifest.json whenever the dataset changes, and on a monthly
# cadence. The manifest version + checksum are kept correct and committed here
# so the app picks up new passages without an App Store release.

on:
  workflow_dispatch: {}            # manual trigger
  push:
    paths:
      - 'data/passages.json'        # rebuild manifest when data is updated
  schedule:
    - cron: '0 9 1 * *'            # 09:00 UTC on the 1st of every month

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Rebuild + validate manifest
        run: node scripts/build-manifest.mjs
      - name: Commit manifest if changed
        run: |
          if [[ -n "$(git status --porcelain data/manifest.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/manifest.json
            git commit -m "chore: refresh data manifest [skip ci]"
            git push
          else
            echo "Manifest unchanged."
          fi
